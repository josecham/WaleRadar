<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhaleRadar Lite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght=700&family=JetBrains+Mono&display=swap');
        body { background-color: #05070a; font-family: 'Space Grotesk', sans-serif; color: #f8fafc; margin: 0; overflow-x: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .whale-card { background: linear-gradient(145deg, #0f172a, #020617); border: 1px solid #1e293b; }
        .live-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .mega-whale-alert {
            animation: alert-flash 0.8s infinite alternate;
            border: 2px solid #3b82f6;
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.4);
        }
        @keyframes alert-flash {
            from { background-color: rgba(59, 130, 246, 0.1); transform: scale(1); }
            to { background-color: rgba(59, 130, 246, 0.3); transform: scale(1.02); }
        }
    </style>
</head>
<body>

    <div id="app-container" class="max-w-md mx-auto min-h-screen bg-[#05070a] pb-24">
        
        <div id="mega-alert" class="hidden fixed top-20 left-4 right-4 z-50 mega-whale-alert p-6 rounded-3xl text-center backdrop-blur-xl">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-10 h-10 text-blue-400 mb-2 mx-auto">
                <path fillRule="evenodd" d="M12 2.25c-4.142 0-7.5 3.358-7.5 7.5v5.524c0 .888.396 1.73 1.082 2.298l2.122 1.758A3.75 3.75 0 0 0 10.126 20.25h3.748a3.75 3.75 0 0 0 2.422-.92l2.122-1.758A2.89 2.89 0 0 0 19.5 15.274V9.75c0-4.142-3.358-7.5-7.5-7.5Zm0 12a2.25 2.25 0 1 0 0-4 2.25 2.25 0 0 0 0 4Z" clipRule="evenodd" />
            </svg>
            <h2 class="text-2xl font-black tracking-tighter text-white uppercase italic">MEGA WHALE ALERT</h2>
            <p id="mega-alert-text" class="mono text-blue-400 text-lg font-bold">0 BTC</p>
        </div>

        <header class="p-6 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-lg z-20 border-b border-white/5">
            <h1 class="text-2xl font-black italic uppercase tracking-tighter text-white">Whale<span class="text-blue-400">Radar</span></h1>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-blue-500 rounded-full live-dot"></span>
                <span class="text-[9px] mono font-bold text-gray-500 uppercase tracking-widest">Live Flow Only</span>
            </div>
        </header>

        <div class="p-6">
            <div class="space-y-4">
                <h3 class="text-[10px] mono text-gray-600 font-black uppercase tracking-[0.4em] mb-6 text-center italic">Institutional Live Feed</h3>
                
                <div id="feed-lista" class="space-y-4">
                    <div id="waiting-msg" class="text-center py-12 text-gray-600 mono text-xs animate-pulse">
                        ESPERANDO MOVIMIENTOS EN LA BLOCKCHAIN...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            var feedLista = document.getElementById('feed-lista');
            var waitingMsg = document.getElementById('waiting-msg');
            var megaAlert = document.getElementById('mega-alert');
            var megaAlertText = document.getElementById('mega-alert-text');
            var eventsCache = [];

            // Iniciar conexión directa con la Blockchain
            var socket;
            function connectBlockchain() {
                try {
                    socket = new WebSocket('wss://ws.blockchain.info/inv');
                    
                    socket.onopen = function() {
                        socket.send(JSON.stringify({ "op": "unconfirmed_sub" }));
                    };

                    socket.onmessage = function(msg) {
                        try {
                            var data = JSON.parse(msg.data);
                            if (data.op === "utx" && data.x && data.x.out) {
                                var totalSatoshis = data.x.out.reduce(function(acc, out) { 
                                    return acc + (out.value || 0); 
                                }, 0);
                                var btcValue = totalSatoshis / 100000000;

                                // Filtrar: Solo movimientos institucionales de ballenas (Mínimo 5 BTC)
                                if (btcValue >= 5) {
                                    if (waitingMsg) {
                                        waitingMsg.style.display = 'none';
                                    }

                                    var isBull = data.x.out.length <= 2;
                                    var txid = data.x.hash || "Unknown TXID";
                                    var timeStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                                    var amountFormatted = btcValue.toLocaleString(undefined, {minimumFractionDigits: 2});

                                    // Disparar Alerta Visual si es una Mega Ballena (>= 1000 BTC)
                                    if (btcValue >= 1000) {
                                        megaAlertText.innerText = amountFormatted + " BTC en " + (isBull ? 'COMPRA' : 'VENTA');
                                        megaAlert.classList.remove('hidden');
                                        
                                        try {
                                            var audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
                                            audio.volume = 0.4;
                                            audio.play().catch(function(){});
                                        } catch(e){}

                                        setTimeout(function() {
                                            megaAlert.classList.add('hidden');
                                        }, 7000);
                                    }

                                    // Crear el elemento HTML en string para no estresar el DOM
                                    var badgeClass = isBull ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400';
                                    var badgeLabel = isBull ? 'BUY / ACCUMULATION' : 'SELL / DISTRIBUTION';
                                    
                                    var cardHtml = `
                                        <div class="whale-card p-6 rounded-[2.5rem] border-white/5 opacity-0 transform translate-y-2 transition-all duration-300" style="opacity: 1; transform: translateY(0);">
                                            <div class="flex justify-between items-center">
                                                <div>
                                                    <span class="text-[8px] mono text-blue-500 font-bold uppercase tracking-wider">On-Chain Realtime</span>
                                                    <div class="text-2xl font-black text-white">${amountFormatted} <span class="text-blue-400 text-lg">BTC</span></div>
                                                </div>
                                                <div class="px-4 py-2 rounded-xl text-[9px] mono font-black ${badgeClass}">
                                                    ${badgeLabel}
                                                </div>
                                            </div>
                                            <div class="mt-3 flex justify-between items-center text-[8px] mono text-gray-600 font-bold">
                                                <span>TX: ${txid.substring(0, 20)}...</span>
                                                <span class="text-gray-500">${timeStr}</span>
                                            </div>
                                        </div>
                                    `;

                                    // Renderizar arriba del feed y limitar a 12 items
                                    feedLista.insertAdjacentHTML('afterbegin', cardHtml);
                                    if (feedLista.children.length > 13) {
                                        feedLista.removeChild(feedLista.lastChild);
                                    }
                                }
                            }
                        } catch (err) {}
                    };

                    socket.onclose = function() {
                        setTimeout(connectBlockchain, 5000); // Auto-reconexión si cae
                    };
                } catch (e) {
                    setTimeout(connectBlockchain, 5000);
                }
            }

            connectBlockchain();
        })();
    </script>
</body>
</html>
